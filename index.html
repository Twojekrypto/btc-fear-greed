<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Price vs. Crypto Fear And Greed</title>
    <meta name="description"
        content="Interactive chart showing Bitcoin price colored by the Crypto Fear and Greed Index sentiment.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e1a;
            color: #e0e4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chart-container {
            width: 100%;
            max-width: 1400px;
            background: linear-gradient(145deg, #111827 0%, #0d1320 50%, #0f172a 100%);
            border-radius: 16px;
            padding: 28px 28px 20px;
            box-shadow:
                0 0 0 1px rgba(99, 102, 241, 0.08),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(99, 102, 241, 0.04);
            position: relative;
            overflow: hidden;
        }

        .chart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .chart-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f97316;
            box-shadow: 0 0 8px rgba(249, 115, 22, 0.5);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .chart-title h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e0e4f0;
            letter-spacing: -0.02em;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .current-price {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.03em;
        }

        .current-fng {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .current-fng .fng-value {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .current-fng .fng-label {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .time-selector {
            display: flex;
            gap: 2px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 3px;
        }

        .time-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #8b92a5;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .time-btn:hover {
            color: #c0c6d6;
        }

        .time-btn.active {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
        }

        .date-range-picker {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-range-picker label {
            font-size: 11px;
            color: #6b7280;
            font-weight: 500;
        }

        .date-range-picker input[type="date"] {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #c0c6d6;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            padding: 4px 8px;
            outline: none;
            transition: border-color 0.2s ease;
            cursor: pointer;
            color-scheme: dark;
        }

        .date-range-picker input[type="date"]:hover {
            border-color: rgba(99, 102, 241, 0.3);
        }

        .date-range-picker input[type="date"]:focus {
            border-color: rgba(99, 102, 241, 0.5);
        }

        .date-range-picker .separator {
            color: #4b5268;
            font-size: 11px;
        }

        .legend {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            font-size: 11px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .legend-item.disabled {
            opacity: 0.35;
        }

        .legend-item .swatch {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* F&G Range Slider */
        .fng-slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 420px;
        }

        .fng-slider-label {
            font-size: 11px;
            color: #6b7280;
            font-weight: 500;
            white-space: nowrap;
        }

        .fng-slider-value {
            font-size: 12px;
            font-weight: 600;
            color: #e0e4f0;
            min-width: 28px;
            text-align: center;
        }

        .fng-slider-track-wrapper {
            position: relative;
            flex: 1;
            height: 28px;
            display: flex;
            align-items: center;
        }

        .fng-slider-track {
            position: absolute;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #00e676 0%, #66ff99 25%, #ffeb3b 50%, #ff9800 75%, #ff1744 100%);
            opacity: 0.4;
        }

        .fng-slider-track-active {
            position: absolute;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #00e676 0%, #66ff99 25%, #ffeb3b 50%, #ff9800 75%, #ff1744 100%);
            opacity: 1;
        }

        .fng-slider-track-wrapper input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            width: 100%;
            height: 28px;
            background: transparent;
            pointer-events: none;
            margin: 0;
            z-index: 2;
        }

        .fng-slider-track-wrapper input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e0e4f0;
            border: 2px solid #6366f1;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 0 6px rgba(99, 102, 241, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .fng-slider-track-wrapper input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.7);
        }

        .fng-slider-track-wrapper input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e0e4f0;
            border: 2px solid #6366f1;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 0 6px rgba(99, 102, 241, 0.5);
        }

        .chart-wrapper {
            position: relative;
            height: 480px;
            cursor: crosshair;
        }

        .selection-overlay {
            position: absolute;
            top: 0;
            bottom: 0;
            background: rgba(99, 102, 241, 0.15);
            border-left: 1px solid rgba(99, 102, 241, 0.4);
            border-right: 1px solid rgba(99, 102, 241, 0.4);
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .reset-zoom-btn {
            display: none;
            padding: 4px 12px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.1);
            color: #a5b4fc;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-zoom-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .reset-zoom-btn.visible {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 8px;
            z-index: 10;
            gap: 12px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(99, 102, 241, 0.15);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 13px;
            color: #8b92a5;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-text {
            font-size: 11px;
            color: #4b5268;
        }

        .footer a {
            color: #6366f1;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .chart-container {
                padding: 16px;
            }

            .chart-header {
                flex-direction: column;
            }

            .controls {
                align-items: flex-start;
            }

            .chart-wrapper {
                height: 320px;
            }

            .current-price {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="chart-container">
        <div class="chart-header">
            <div class="header-left">
                <div class="chart-title">
                    <span class="dot"></span>
                    <h1>BTC Price vs. Crypto Fear And Greed</h1>
                </div>
                <div class="info-row" id="infoRow"></div>
            </div>
            <div class="controls">
                <div class="time-selector" id="timeSelector">
                    <button class="time-btn" data-range="30">1M</button>
                    <button class="time-btn" data-range="90">3M</button>
                    <button class="time-btn" data-range="180">6M</button>
                    <button class="time-btn active" data-range="365">1Y</button>
                    <button class="time-btn" data-range="730">2Y</button>
                    <button class="time-btn" data-range="1825">5Y</button>
                    <button class="time-btn" data-range="0">ALL</button>
                </div>
                <div class="date-range-picker">
                    <label>From</label>
                    <input type="date" id="dateFrom">
                    <span class="separator">—</span>
                    <label>To</label>
                    <input type="date" id="dateTo">
                    <button class="reset-zoom-btn" id="resetZoom">✕ Reset</button>
                </div>
                <div class="legend" id="legend"></div>
                <div class="fng-slider-container">
                    <span class="fng-slider-label">F&G Range:</span>
                    <span class="fng-slider-value" id="fngMinVal">0</span>
                    <div class="fng-slider-track-wrapper">
                        <div class="fng-slider-track"></div>
                        <div class="fng-slider-track-active" id="fngTrackActive"></div>
                        <input type="range" id="fngMin" min="0" max="100" value="0">
                        <input type="range" id="fngMax" min="0" max="100" value="100">
                    </div>
                    <span class="fng-slider-value" id="fngMaxVal">100</span>
                </div>
            </div>
        </div>

        <div class="chart-wrapper" id="chartWrapper">
            <canvas id="fngChart"></canvas>
            <div class="selection-overlay" id="selectionOverlay"></div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text" id="loadingText">Loading market data...</div>
            </div>
        </div>

        <div class="footer">
            <span class="footer-text">Data: <a href="https://alternative.me/crypto/fear-and-greed-index/"
                    target="_blank">Alternative.me</a> · <a href="https://www.binance.com/"
                    target="_blank">Binance</a></span>
            <span class="footer-text" id="lastUpdate"></span>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            // ── Sentiment config ──
            const SENTIMENTS = [
                { key: 'extFear', label: 'Ext Fear', color: '#00e676', min: 0, max: 24 },
                { key: 'fear', label: 'Fear', color: '#66ff99', min: 25, max: 44 },
                { key: 'neutral', label: 'Neutral', color: '#ffeb3b', min: 45, max: 55 },
                { key: 'greed', label: 'Greed', color: '#ff9800', min: 56, max: 74 },
                { key: 'extGreed', label: 'Ext Greed', color: '#ff1744', min: 75, max: 100 },
            ];

            const DIM_COLOR = '#ffffff';

            // ── State ──
            let chart = null;
            let mergedData = [];    // [{date, price, fngValue, sentiment}]
            let currentRange = 365;
            let customFrom = null;  // Date object or null
            let customTo = null;    // Date object or null
            let fngRangeMin = 0;    // F&G slider min
            let fngRangeMax = 100;  // F&G slider max
            const visibility = {};
            SENTIMENTS.forEach(s => visibility[s.key] = true);

            // ── Fetch Fear & Greed (full history from Alternative.me) ──
            async function fetchFearAndGreed() {
                const res = await fetch('https://api.alternative.me/fng/?limit=0&format=json');
                const json = await res.json();
                const map = new Map();
                json.data.forEach(d => {
                    const date = new Date(parseInt(d.timestamp) * 1000);
                    const key = date.toISOString().slice(0, 10);
                    map.set(key, {
                        value: parseInt(d.value),
                        classification: d.value_classification,
                    });
                });
                return map; // dateString -> {value, classification}
            }

            // ── Fetch BTC Price (full history from Binance) ──
            async function fetchBtcPrice() {
                updateLoadingText('Loading BTC price history...');
                const allCandles = [];
                const DAY_MS = 86400000;
                // Binance klines: max 1000 candles per request
                // F&G index starts Feb 2018, so start from Jan 2018
                const startTime = new Date('2018-01-01').getTime();
                const now = Date.now();

                let cursor = startTime;
                let batch = 0;
                while (cursor < now) {
                    batch++;
                    if (batch > 1) {
                        updateLoadingText(`Loading BTC price... (batch ${batch})`);
                    }
                    try {
                        const res = await fetch(
                            `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=1000&startTime=${cursor}`
                        );
                        if (!res.ok) break;
                        const data = await res.json();
                        if (!data.length) break;

                        data.forEach(candle => {
                            allCandles.push({
                                date: new Date(candle[0]),
                                price: parseFloat(candle[4]), // close price
                            });
                        });

                        // Move cursor past the last candle
                        const lastTs = data[data.length - 1][0];
                        cursor = lastTs + DAY_MS;

                        // Tiny delay to be polite to the API
                        if (cursor < now) {
                            await new Promise(r => setTimeout(r, 200));
                        }
                    } catch (e) {
                        console.warn('Binance fetch error:', e);
                        break;
                    }
                }

                // Deduplicate by day
                const byDay = new Map();
                allCandles.forEach(c => {
                    const key = c.date.toISOString().slice(0, 10);
                    byDay.set(key, c);
                });

                return Array.from(byDay.values()).sort((a, b) => a.date - b.date);
            }

            function updateLoadingText(text) {
                const el = document.getElementById('loadingText');
                if (el) el.textContent = text;
            }

            // ── Merge BTC price + F&G by date ──
            function mergeData(btcPrices, fngMap) {
                return btcPrices.map(btc => {
                    const key = btc.date.toISOString().slice(0, 10);
                    const fng = fngMap.get(key);
                    const sentiment = fng ? getSentiment(fng.value) : null;
                    return {
                        date: btc.date,
                        price: btc.price,
                        fngValue: fng ? fng.value : null,
                        sentiment: sentiment,
                    };
                });
            }

            // ── Classify value ──
            function getSentiment(value) {
                return SENTIMENTS.find(s => value >= s.min && value <= s.max) || SENTIMENTS[0];
            }

            // Get color for a value, respecting visibility toggles + range slider
            function getColorForValue(fngValue) {
                if (fngValue == null) return DIM_COLOR;
                // Check if value is within slider range
                if (fngValue < fngRangeMin || fngValue > fngRangeMax) return DIM_COLOR;
                const sentiment = getSentiment(fngValue);
                if (visibility[sentiment.key]) {
                    return sentiment.color;
                }
                return DIM_COLOR;
            }

            // ── Filter by time range ──
            function filterByRange(data, days) {
                // Custom date range takes priority
                if (customFrom || customTo) {
                    return data.filter(d => {
                        if (customFrom && d.date < customFrom) return false;
                        if (customTo && d.date > customTo) return false;
                        return true;
                    });
                }
                if (days === 0) return data;
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - days);
                return data.filter(d => d.date >= cutoff);
            }

            // ── Sentiment cloud plugin (glowing dots on the price line) ──
            const sentimentCloudPlugin = {
                id: 'sentimentCloud',
                afterDatasetsDraw(chart) {
                    const { ctx, chartArea, scales } = chart;
                    if (!chartArea) return;
                    const filtered = filterByRange(mergedData, currentRange);
                    if (filtered.length < 2) return;

                    const xScale = scales.x;
                    const yScale = scales.yPrice;

                    // Calculate dot radius based on data density — bigger & more visible
                    const chartWidth = chartArea.right - chartArea.left;
                    const spacing = chartWidth / filtered.length;
                    const radius = Math.max(Math.min(spacing * 2.5, 20), 6);
                    const outerRadius = radius * 1.6; // larger outer glow

                    ctx.save();

                    for (let i = 0; i < filtered.length; i++) {
                        const d = filtered[i];
                        if (d.fngValue == null || !d.sentiment) continue;
                        if (!visibility[d.sentiment.key]) continue;
                        // Respect slider range
                        if (d.fngValue < fngRangeMin || d.fngValue > fngRangeMax) continue;

                        const x = xScale.getPixelForValue(d.date.getTime());
                        const y = yScale.getPixelForValue(d.price);

                        // Skip if outside chart area
                        if (x < chartArea.left || x > chartArea.right) continue;
                        if (y < chartArea.top || y > chartArea.bottom) continue;

                        const color = d.sentiment.color;

                        // Outer soft glow (bloom)
                        ctx.globalCompositeOperation = 'source-over';
                        const outerGrad = ctx.createRadialGradient(x, y, 0, x, y, outerRadius);
                        outerGrad.addColorStop(0, color + '26'); // 15% center
                        outerGrad.addColorStop(0.4, color + '1a'); // 10% mid
                        outerGrad.addColorStop(1, color + '00'); // transparent
                        ctx.beginPath();
                        ctx.arc(x, y, outerRadius, 0, Math.PI * 2);
                        ctx.fillStyle = outerGrad;
                        ctx.fill();

                        // Inner core
                        ctx.globalCompositeOperation = 'source-over';
                        const innerGrad = ctx.createRadialGradient(x, y, 0, x, y, radius);
                        innerGrad.addColorStop(0, color + '59'); // 35% center
                        innerGrad.addColorStop(0.4, color + '2e'); // 18% mid
                        innerGrad.addColorStop(1, color + '00'); // transparent
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fillStyle = innerGrad;
                        ctx.fill();
                    }

                    ctx.restore();
                },
            };

            // ── Build dataset ──
            function buildDatasets() {
                const filtered = filterByRange(mergedData, currentRange);

                return [{
                    label: 'BTC Price',
                    data: filtered.map(d => ({ x: d.date, y: d.price })),
                    borderWidth: 2.5,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointHoverBorderWidth: 2,
                    pointHoverBackgroundColor: '#fff',
                    yAxisID: 'yPrice',
                    tension: 0.1,
                    spanGaps: true,
                    fill: false,
                    // Per-segment coloring by F&G sentiment
                    segment: {
                        borderColor: function (ctx) {
                            const idx = ctx.p1DataIndex;
                            const d = filtered[idx];
                            if (!d) return DIM_COLOR;
                            return getColorForValue(d.fngValue);
                        },
                    },
                    borderColor: '#6366f1', // fallback
                }];
            }

            // ── Create chart ──
            function createChart() {
                const ctx = document.getElementById('fngChart').getContext('2d');

                // Custom tooltip
                const externalTooltip = (context) => {
                    const { chart, tooltip } = context;
                    let el = chart.canvas.parentNode.querySelector('.custom-tooltip');
                    if (!el) {
                        el = document.createElement('div');
                        el.className = 'custom-tooltip';
                        el.style.cssText = `
                        position: absolute;
                        pointer-events: none;
                        background: rgba(15, 23, 42, 0.95);
                        border: 1px solid rgba(255,255,255,0.1);
                        border-radius: 10px;
                        padding: 12px 16px;
                        font-family: 'Inter', sans-serif;
                        font-size: 12px;
                        color: #e0e4f0;
                        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
                        transition: all 0.1s ease;
                        z-index: 100;
                        backdrop-filter: blur(8px);
                        max-width: 280px;
                        line-height: 1.5;
                    `;
                        chart.canvas.parentNode.appendChild(el);
                    }

                    if (tooltip.opacity === 0) {
                        el.style.opacity = '0';
                        return;
                    }

                    const filtered = filterByRange(mergedData, currentRange);

                    let html = '';
                    if (tooltip.title?.length) {
                        html += `<div style="font-weight:600; margin-bottom:6px; color:#a5b4fc;">${tooltip.title[0]}</div>`;
                    }

                    tooltip.dataPoints?.forEach(point => {
                        const idx = point.dataIndex;
                        const d = filtered[idx];
                        const price = '$' + point.parsed.y.toLocaleString('en-US', { maximumFractionDigits: 0 });

                        html += `<div style="display:flex;align-items:center;gap:6px;margin:3px 0;">
                        <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(255,255,255,0.7);"></span>
                        <span style="color:#8b92a5;">BTC:</span> <strong>${price}</strong>
                    </div>`;

                        if (d && d.fngValue != null) {
                            const s = d.sentiment;
                            html += `<div style="display:flex;align-items:center;gap:6px;margin:3px 0;">
                            <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${s.color};"></span>
                            <span style="color:#8b92a5;">F&G:</span> <strong>${d.fngValue}</strong>
                            <span style="font-size:10px;padding:1px 6px;border-radius:3px;background:${s.color}22;color:${s.color};font-weight:600;">${s.label}</span>
                        </div>`;
                        }
                    });

                    el.innerHTML = html;
                    el.style.opacity = '1';

                    const { offsetLeft, offsetTop } = chart.canvas;
                    let left = offsetLeft + tooltip.caretX + 14;
                    let top = offsetTop + tooltip.caretY - 24;

                    const rect = chart.canvas.parentNode.getBoundingClientRect();
                    if (left + 280 > rect.width) left = offsetLeft + tooltip.caretX - 290;
                    if (top < 0) top = 10;

                    el.style.left = left + 'px';
                    el.style.top = top + 'px';
                };

                chart = new Chart(ctx, {
                    plugins: [sentimentCloudPlugin],
                    type: 'line',
                    data: { datasets: buildDatasets() },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                enabled: false,
                                external: externalTooltip,
                                callbacks: {
                                    title: function (items) {
                                        if (!items.length) return '';
                                        const d = new Date(items[0].parsed.x);
                                        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                                    },
                                },
                            },
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: {
                                    unit: getTimeUnit(),
                                    displayFormats: {
                                        week: 'MMM d',
                                        month: 'MMM yyyy',
                                        year: 'yyyy',
                                    },
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.04)',
                                    drawTicks: false,
                                },
                                ticks: {
                                    color: '#4b5268',
                                    font: { size: 11, family: 'Inter' },
                                    maxTicksLimit: 14,
                                    padding: 8,
                                },
                                border: { display: false },
                            },
                            yPrice: {
                                type: 'logarithmic',
                                position: 'right',
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.03)',
                                    drawTicks: false,
                                },
                                ticks: {
                                    color: '#6b7280',
                                    font: { size: 11, family: 'Inter' },
                                    callback: function (v) {
                                        // Only show clean tick values to avoid dense clutter
                                        const clean = [1000, 2000, 3000, 4000, 5000, 6000, 7000, 8000, 9000, 10000, 15000, 20000, 30000, 40000, 50000, 60000, 70000, 80000, 90000, 100000, 120000, 150000, 200000];
                                        if (!clean.includes(Math.round(v))) return null;
                                        if (v >= 1000) return '$' + (v / 1000).toFixed(0) + 'k';
                                        return '$' + v;
                                    },
                                    padding: 8,
                                    maxTicksLimit: 10,
                                },
                                border: { display: false },
                            },
                        },
                        animation: {
                            duration: 600,
                            easing: 'easeOutQuart',
                        },
                    },
                });
            }

            function getTimeUnit() {
                // If custom range, calculate days between
                if (customFrom || customTo) {
                    const from = customFrom || mergedData[0]?.date || new Date();
                    const to = customTo || new Date();
                    const days = (to - from) / 86400000;
                    if (days <= 90) return 'week';
                    return 'month';
                }
                if (currentRange <= 90) return 'week';
                if (currentRange <= 730) return 'month';
                return 'month';
            }

            function updateChart() {
                if (!chart) return;
                chart.data.datasets = buildDatasets();
                chart.options.scales.x.time.unit = getTimeUnit();
                chart.update('none');
            }

            // ── Legend ──
            function buildLegend() {
                const container = document.getElementById('legend');
                container.innerHTML = '';
                SENTIMENTS.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'legend-item' + (visibility[s.key] ? '' : ' disabled');
                    item.innerHTML = `<span class="swatch" style="background:${s.color}"></span><span>${s.label}</span>`;
                    item.addEventListener('click', () => {
                        visibility[s.key] = !visibility[s.key];
                        item.classList.toggle('disabled');
                        updateChart();
                    });
                    container.appendChild(item);
                });
            }

            // ── Time range selector ──
            function setupTimeSelector() {
                const container = document.getElementById('timeSelector');
                container.querySelectorAll('.time-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        container.querySelector('.active')?.classList.remove('active');
                        btn.classList.add('active');
                        currentRange = parseInt(btn.dataset.range);
                        // Clear custom dates when preset is clicked
                        customFrom = null;
                        customTo = null;
                        document.getElementById('dateFrom').value = '';
                        document.getElementById('dateTo').value = '';
                        updateChart();
                    });
                });
            }

            // ── Custom date range ──
            function setupDatePickers() {
                const fromInput = document.getElementById('dateFrom');
                const toInput = document.getElementById('dateTo');

                function onDateChange() {
                    const fromVal = fromInput.value;
                    const toVal = toInput.value;

                    customFrom = fromVal ? new Date(fromVal + 'T00:00:00') : null;
                    customTo = toVal ? new Date(toVal + 'T23:59:59') : null;

                    if (customFrom || customTo) {
                        // Deactivate preset buttons
                        document.querySelector('#timeSelector .active')?.classList.remove('active');
                        document.getElementById('resetZoom').classList.add('visible');
                    } else {
                        document.getElementById('resetZoom').classList.remove('visible');
                    }

                    updateChart();
                }

                fromInput.addEventListener('change', onDateChange);
                toInput.addEventListener('change', onDateChange);

                // Reset button
                document.getElementById('resetZoom').addEventListener('click', () => {
                    customFrom = null;
                    customTo = null;
                    fromInput.value = '';
                    toInput.value = '';
                    document.getElementById('resetZoom').classList.remove('visible');
                    // Re-activate the 1Y preset
                    const container = document.getElementById('timeSelector');
                    container.querySelector('.active')?.classList.remove('active');
                    const btn1Y = container.querySelector('[data-range="365"]');
                    if (btn1Y) btn1Y.classList.add('active');
                    currentRange = 365;
                    updateChart();
                });
            }

            // ── Info row (current price + F&G) ──
            function showInfoRow() {
                if (!mergedData.length) return;
                const latest = mergedData[mergedData.length - 1];
                const el = document.getElementById('infoRow');

                let fngHtml = '';
                if (latest.fngValue != null) {
                    const s = latest.sentiment;
                    fngHtml = `
                    <div class="current-fng">
                        <span class="fng-value" style="color:${s.color}">${latest.fngValue}</span>
                        <span class="fng-label" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}44;">${s.label}</span>
                    </div>
                `;
                }

                el.innerHTML = `
                <span class="current-price">$${latest.price.toLocaleString('en-US', { maximumFractionDigits: 0 })}</span>
                ${fngHtml}
            `;

                document.getElementById('lastUpdate').textContent =
                    'Updated: ' + latest.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            // ── Drag selection on chart ──
            function setupDragSelection() {
                const wrapper = document.getElementById('chartWrapper');
                const overlay = document.getElementById('selectionOverlay');
                let isDragging = false;
                let startX = 0;

                wrapper.addEventListener('mousedown', (e) => {
                    if (!chart || e.button !== 0) return;
                    const rect = wrapper.getBoundingClientRect();
                    startX = e.clientX - rect.left;
                    isDragging = true;
                    overlay.style.display = 'block';
                    overlay.style.left = startX + 'px';
                    overlay.style.width = '0px';
                });

                wrapper.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    const rect = wrapper.getBoundingClientRect();
                    const currentX = e.clientX - rect.left;
                    const left = Math.min(startX, currentX);
                    const width = Math.abs(currentX - startX);
                    overlay.style.left = left + 'px';
                    overlay.style.width = width + 'px';
                });

                const finishDrag = (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    overlay.style.display = 'none';

                    if (!chart) return;
                    const rect = wrapper.getBoundingClientRect();
                    const endX = e.clientX - rect.left;
                    const minDrag = 20; // minimum pixels to count as selection
                    if (Math.abs(endX - startX) < minDrag) return;

                    const xScale = chart.scales.x;
                    const leftPx = Math.min(startX, endX);
                    const rightPx = Math.max(startX, endX);

                    // Convert pixel to date value using Chart.js scale
                    const dateLeft = new Date(xScale.getValueForPixel(leftPx));
                    const dateRight = new Date(xScale.getValueForPixel(rightPx));

                    if (isNaN(dateLeft.getTime()) || isNaN(dateRight.getTime())) return;

                    // Set custom range
                    customFrom = dateLeft;
                    customTo = dateRight;

                    // Update date inputs
                    const fromInput = document.getElementById('dateFrom');
                    const toInput = document.getElementById('dateTo');
                    fromInput.value = dateLeft.toISOString().slice(0, 10);
                    toInput.value = dateRight.toISOString().slice(0, 10);

                    // Deactivate presets, show reset
                    document.querySelector('#timeSelector .active')?.classList.remove('active');
                    document.getElementById('resetZoom').classList.add('visible');

                    updateChart();
                };

                wrapper.addEventListener('mouseup', finishDrag);
                wrapper.addEventListener('mouseleave', (e) => {
                    if (isDragging) {
                        // Hide overlay on mouse leave without applying
                        isDragging = false;
                        overlay.style.display = 'none';
                    }
                });
            }

            // ── F&G Range Slider ──
            function setupFngSlider() {
                const minInput = document.getElementById('fngMin');
                const maxInput = document.getElementById('fngMax');
                const minLabel = document.getElementById('fngMinVal');
                const maxLabel = document.getElementById('fngMaxVal');
                const activeTrack = document.getElementById('fngTrackActive');

                function updateSlider() {
                    let minVal = parseInt(minInput.value);
                    let maxVal = parseInt(maxInput.value);

                    // Enforce min <= max
                    if (minVal > maxVal) {
                        if (this === minInput) {
                            maxInput.value = minVal;
                            maxVal = minVal;
                        } else {
                            minInput.value = maxVal;
                            minVal = maxVal;
                        }
                    }

                    fngRangeMin = minVal;
                    fngRangeMax = maxVal;

                    minLabel.textContent = minVal;
                    maxLabel.textContent = maxVal;

                    // Update active track position
                    const left = minVal + '%';
                    const width = (maxVal - minVal) + '%';
                    activeTrack.style.left = left;
                    activeTrack.style.width = width;

                    // Color the min/max labels based on sentiment
                    const minSentiment = getSentiment(minVal);
                    const maxSentiment = getSentiment(maxVal);
                    minLabel.style.color = minSentiment.color;
                    maxLabel.style.color = maxSentiment.color;

                    updateChart();
                }

                minInput.addEventListener('input', updateSlider);
                maxInput.addEventListener('input', updateSlider);

                // Initialize track
                updateSlider.call(minInput);
            }

            // ── Init ──
            async function init() {
                setupTimeSelector();
                setupDatePickers();
                buildLegend();
                setupDragSelection();
                setupFngSlider();

                try {
                    updateLoadingText('Loading Fear & Greed data...');
                    const [fngMap, btcPrices] = await Promise.all([
                        fetchFearAndGreed(),
                        fetchBtcPrice(),
                    ]);

                    updateLoadingText('Merging datasets...');
                    mergedData = mergeData(btcPrices, fngMap);

                    createChart();
                    showInfoRow();
                } catch (err) {
                    console.error('Failed to load data:', err);
                    document.getElementById('loadingOverlay').innerHTML = `
                    <div style="color: #ef4444; font-size: 14px;">Failed to load data</div>
                    <div style="color: #6b7280; font-size: 12px; margin-top: 4px;">${err.message}</div>
                    <button onclick="location.reload()" style="margin-top:12px; padding:6px 16px; border-radius:6px; border:1px solid rgba(99,102,241,0.3); background:rgba(99,102,241,0.1); color:#a5b4fc; cursor:pointer; font-family:Inter; font-size:12px;">Retry</button>
                `;
                    return;
                }

                document.getElementById('loadingOverlay').style.display = 'none';
            }

            init();
        })();
    </script>
</body>

</html>
